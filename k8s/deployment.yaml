apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: springboot-demo

  template:
    metadata:
      labels:
        app: springboot-demo

    spec:
      nodeName: server1

      containers:
      - name: springboot-demo
        image: docker.io/dheerajvalecha/springboot-demo:1.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8081
